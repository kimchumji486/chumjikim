<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Space Pinball | 추억의 3D 스페이스 핀볼</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor">
        <div class="stars"></div>
        <div class="nebula-1"></div>
        <div class="nebula-2"></div>
    </div>

    <div class="game-container">
        <!-- Sidebar: Scoreboard -->
        <aside class="scoreboard-panel glass-panel">
            <div class="panel-header">
                <h2>SPACE</h2>
                <h3>CADET</h3>
                <div class="sub-title">PINBALL</div>
            </div>

            <div class="score-display">
                <div class="score-label">SCORE</div>
                <div class="score-val" id="score">000,000</div>
            </div>

            <div class="score-display">
                <div class="score-label">HIGH SCORE</div>
                <div class="score-val" id="high-score">000,000</div>
            </div>

            <div class="status-grid">
                <div class="status-item">
                    <div class="status-label">BALL</div>
                    <div class="status-val" id="ball-count">3</div>
                </div>
                <div class="status-item">
                    <div class="status-label">MULTIPLIER</div>
                    <div class="status-val" id="multiplier">x1</div>
                </div>
            </div>

            <div class="controls-guide">
                <h4>CONTROLS</h4>
                <div class="control-row">
                    <span class="key">Z</span> 또는 <span class="key">←</span>
                    <span class="desc">좌측 플리퍼</span>
                </div>
                <div class="control-row">
                    <span class="key">/</span> 또는 <span class="key">→</span>
                    <span class="desc">우측 플리퍼</span>
                </div>
                <div class="control-row">
                    <span class="key">Spacebar</span>
                    <span class="desc">차지 / 볼 발사</span>
                </div>
            </div>
            
            <button id="btn-toggle-sound" class="sound-btn" title="사운드 켜기/끄기">
                <i class="fa-solid fa-volume-high"></i>
            </button>
        </aside>

        <!-- Main Board Area -->
        <main class="board-area">
            <div class="canvas-wrapper">
                <canvas id="pinball-canvas" width="500" height="750"></canvas>

                <!-- Overlay Screens -->
                <div class="game-overlay" id="intro-overlay">
                    <div class="overlay-content">
                        <i class="fa-solid fa-shuttle-space rocket-icon animate-float"></i>
                        <h1 class="blink-text">PRESS SPACE</h1>
                        <p>스페이스바를 길게 눌러 런처를 차징하고 공을 쏘아 올리세요!</p>
                        <button id="btn-start-game" class="retro-btn">GAME START</button>
                    </div>
                </div>

                <div class="game-overlay hidden" id="gameover-overlay">
                    <div class="overlay-content">
                        <h2 class="gameover-title">GAME OVER</h2>
                        <div class="final-score-box">
                            <p>FINAL SCORE</p>
                            <span id="final-score">000,000</span>
                        </div>
                        <button id="btn-restart" class="retro-btn">PLAY AGAIN</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
